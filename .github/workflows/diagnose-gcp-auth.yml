# Manual diagnostic workflow to help identify which service account is
# authenticated via GCP_SA_KEY, and the active project. Prints only
# non-secret metadata that is useful for repairing IAM bindings (e.g.
# the service account email to grant roles to).
#
# Required GitHub secrets (same as deploy-firestore.yml):
#   GCP_SA_KEY      - JSON service account key
#   GCP_PROJECT_ID  - target GCP project id
#
# Run via: Actions tab -> "Diagnose GCP Auth" -> Run workflow.
name: Diagnose GCP Auth

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Print non-secret auth metadata
        run: |
          set -e
          echo "=== Active gcloud account ==="
          gcloud auth list --filter=status:ACTIVE --format='value(account)'

          echo ""
          echo "=== Active project ==="
          gcloud config get-value project

          echo ""
          echo "=== Service account details (describe) ==="
          SA_EMAIL="$(gcloud auth list --filter=status:ACTIVE --format='value(account)')"
          if [ -n "$SA_EMAIL" ]; then
            # uniqueId and email are non-secret. Do NOT print keys.
            gcloud iam service-accounts describe "$SA_EMAIL" \
              --format='value(email,uniqueId,disabled,oauth2ClientId)' \
              || echo "(describe failed - the SA likely lacks iam.serviceAccounts.get on itself; email above is still authoritative)"
          else
            echo "(no active account detected)"
          fi

          echo ""
          echo "=== IAM roles bound to this SA on the project ==="
          if [ -n "$SA_EMAIL" ]; then
            gcloud projects get-iam-policy "${{ secrets.GCP_PROJECT_ID }}" \
              --flatten="bindings[].members" \
              --filter="bindings.members:serviceAccount:${SA_EMAIL}" \
              --format='value(bindings.role)' \
              || echo "(get-iam-policy failed - SA likely lacks resourcemanager.projects.getIamPolicy)"
          fi

          echo ""
          echo "Done. Grant any missing roles to: $SA_EMAIL"
