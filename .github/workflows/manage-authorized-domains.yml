# Idempotently appends one or more domains to the Firebase Auth
# `authorizedDomains` list via the Identity Toolkit Admin API.
#
# Defaults to the live Cloud Run service domain
# `niners-580294245942.us-central1.run.app`, which is the host that
# Firebase rejects with `auth/unauthorized-domain` /
# `auth/internal-error` for Google sign-in unless it is in the
# Authorized Domains list.
#
# Trigger: manual only (workflow_dispatch).
#
# Inputs:
#   domain   - single domain (alias for the common case). Combined with
#              `domains` if both are supplied.
#   domains  - comma- or whitespace-separated list of domains to ensure
#              present. Defaults to the live Cloud Run domain.
#   dry_run  - "true" to fetch and diff but skip the PATCH.
#
# Required GitHub secrets:
#   GCP_SA_KEY      - JSON service-account key (reused from deploy.yml /
#                     provision-director.yml).
#   GCP_PROJECT_ID  - Firebase / GCP project id
#                     (e.g. gen-lang-client-0222945352).
#
# Required IAM role on the service account behind GCP_SA_KEY:
#   - roles/firebaseauth.admin   (grants firebaseauth.configs.{get,update})
#
# If the role is missing, the script fails with explicit gcloud
# instructions for granting it. The Identity Toolkit API must also be
# enabled on the project:
#   gcloud services enable identitytoolkit.googleapis.com --project=$GCP_PROJECT_ID
#
# Security notes:
#   - No tokens, no service-account JSON, and no other secrets are
#     printed. Only the project id, the requested domain list, and the
#     existing/resulting authorizedDomains values are logged — all of
#     which are non-secret configuration.
#   - The PATCH preserves existing entries by reading the current list,
#     taking the union with the requested additions, and writing the
#     union back. No entries are ever removed by this workflow.
name: Manage Firebase Auth Authorized Domains

on:
  workflow_dispatch:
    inputs:
      domain:
        description: "Single domain to ensure present (alias for `domains` — combined if both supplied)"
        required: false
        default: ""
      domains:
        description: "Domains to ensure present (comma- or space-separated)"
        required: false
        default: "niners-580294245942.us-central1.run.app"
      dry_run:
        description: "Fetch and diff but skip the PATCH (true/false)"
        required: false
        default: "false"

jobs:
  manage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install firebase-admin
        run: npm install --no-save firebase-admin@^12

      - name: Manage authorized domains
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SA_KEY }}
          AUTHORIZED_DOMAINS: ${{ inputs.domain }} ${{ inputs.domains }}
          DRY_RUN: ${{ inputs.dry_run == 'true' && '1' || '0' }}
        run: node scripts/manage-authorized-domains.mjs
